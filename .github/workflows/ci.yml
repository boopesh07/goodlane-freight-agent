name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      # Deterministic evals (Tier 1 pipeline + Tier 2 extraction) need no API key
      # and gate every PR. The Tier 3 agent eval (npm run eval) needs a real
      # OPENAI_API_KEY and is non-deterministic, so it runs locally / on demand.
      - run: npm run eval:deterministic
      - run: npm run build
        env:
          # build does not need a live key; a placeholder keeps next build happy.
          OPENAI_API_KEY: "test"
