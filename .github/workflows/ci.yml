name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test
      # Both eval tiers (intake pipeline + extraction accuracy) are deterministic,
      # need no API key, and gate every PR.
      - run: npm run eval
      - run: npm run build
        env:
          # build does not need a live key; a placeholder keeps next build happy.
          OPENAI_API_KEY: "test"
